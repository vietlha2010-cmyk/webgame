<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Game Racing</title>

<style>

body{
    margin:0;
    font-family:Arial;
    color:white;
    text-align:center;

    background:linear-gradient(270deg,#ff0000,#0000ff,#00ffcc);
    background-size:600% 600%;

    animation:bgmove 8s ease infinite;
}

@keyframes bgmove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

h1{
    margin-top:120px;
    font-size:50px;
}

button{
    padding:15px 40px;
    font-size:22px;
    border:none;
    border-radius:10px;

    background:cyan;
    cursor:pointer;

    transition:0.3s;
}

button:hover{
    transform:scale(1.2);
    background:yellow;
}

</style>

</head>

<body>

<h1>Chào mừng đến với Game</h1>

<p>Nhấn Start để chơi</p>

<button onclick="startGame()">Start</button>

<script>

function startGame(){
    window.location.href="he.html";
}

</script>

</body>

</html>
